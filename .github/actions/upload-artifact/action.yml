name: Upload Artifact
description: Upload a workflow artifact with a shared local composite action.

inputs:
  name:
    description: Artifact name.
    required: true
  path:
    description: Artifact path to upload.
    required: true
  retention-days:
    description: Optional retention period in days.
    required: false
    default: ""
  if-no-files-found:
    description: Behavior when no files are found.
    required: false
    default: warn

runs:
  using: composite
  steps:
    - name: Upload artifact
      uses: actions/upload-artifact@v5
      with:
        name: ${{ inputs.name }}
        path: ${{ inputs.path }}
        retention-days: ${{ inputs.retention-days }}
        if-no-files-found: ${{ inputs.if-no-files-found }}
