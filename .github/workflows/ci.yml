name: CI

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'schedule' }}

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      python_version:
        description: "Python version override for manual runs"
        required: false
        default: "3.9"
        type: choice
        options:
          - "3.9"
          - "3.10"
          - "3.11"
          - "3.12"

jobs:
  test:
    uses: ./.github/workflows/ci-job.yml
    name: ${{ github.event_name == 'pull_request' && 'Test Suite (PR)' || 'Test Suite (Push)' }}
    with:
      python_version: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.python_version || '3.9' }}
      artifact_name: ${{ github.event_name == 'pull_request' && 'test-results-pull_request' || github.event_name == 'workflow_dispatch' && 'test-results-workflow_dispatch' || 'test-results-push' }}
      artifact_dir: artifacts/test-results
      event_name: ${{ github.event_name }}
      run_id: ${{ github.run_id }}

  summarize:
    uses: ./.github/workflows/workflow-summary-job.yml
    name: CI Artifact Summary
    needs:
      - test
    if: always()
    with:
      title: "# CI Workflow Summary"
      body: |
        - event_name: `${{ github.event_name }}`
        - artifact_name: `${{ needs.test.outputs.artifact_name }}`
        - artifact_dir: `${{ needs.test.outputs.artifact_dir }}`
